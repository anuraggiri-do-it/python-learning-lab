<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1100" width="700" height="1100" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="700" height="1100" fill="#0f1117"/>

  <!-- Title -->
  <rect x="150" y="20" width="400" height="44" rx="8" fill="#1e2130" stroke="#7c6af7" stroke-width="2"/>
  <text x="350" y="48" text-anchor="middle" fill="#7c6af7" font-size="16" font-weight="bold">Kadane's Algorithm Flowchart</text>

  <!-- Arrow helper: vertical line segments drawn inline -->

  <!-- ── NODE 1: START ── -->
  <ellipse cx="350" cy="120" rx="70" ry="24" fill="#1e2130" stroke="#7c6af7" stroke-width="2"/>
  <text x="350" y="125" text-anchor="middle" fill="#e0e0e0" font-size="13">START</text>

  <!-- Arrow -->
  <line x1="350" y1="144" x2="350" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── NODE 2: Initialize ── -->
  <rect x="195" y="168" width="310" height="52" rx="8" fill="#1a2540" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="350" y="189" text-anchor="middle" fill="#4a90d9" font-size="12" font-weight="bold">Initialize</text>
  <text x="350" y="207" text-anchor="middle" fill="#c0cfe8" font-size="11">current = arr[0]   best = arr[0]</text>

  <!-- Arrow -->
  <line x1="350" y1="220" x2="350" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── NODE 3: Loop i = 1 to n-1 ── -->
  <rect x="210" y="248" width="280" height="40" rx="8" fill="#1a2540" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="350" y="273" text-anchor="middle" fill="#c0cfe8" font-size="12">for i in range(1, len(arr))</text>

  <!-- Arrow -->
  <line x1="350" y1="288" x2="350" y2="316" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── NODE 4: Decision diamond ── -->
  <polygon points="350,316 490,370 350,424 210,370" fill="#1e1a30" stroke="#f0a500" stroke-width="2"/>
  <text x="350" y="364" text-anchor="middle" fill="#f0a500" font-size="11" font-weight="bold">current + arr[i]</text>
  <text x="350" y="380" text-anchor="middle" fill="#f0a500" font-size="11" font-weight="bold">&gt; arr[i] ?</text>

  <!-- YES label (left) -->
  <text x="192" y="366" text-anchor="middle" fill="#4caf50" font-size="11">YES</text>
  <!-- NO label (right) -->
  <text x="508" y="366" text-anchor="middle" fill="#e05555" font-size="11">NO</text>

  <!-- YES arrow → extend -->
  <line x1="210" y1="370" x2="140" y2="370" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="140" y1="370" x2="140" y2="460" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="140" y1="460" x2="195" y2="460" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- NO arrow → restart -->
  <line x1="490" y1="370" x2="560" y2="370" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="560" y1="370" x2="560" y2="460" stroke="#e05555" stroke-width="1.5"/>
  <line x1="560" y1="460" x2="505" y2="460" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- ── NODE 5a: Extend (left box) ── -->
  <rect x="195" y="436" width="160" height="48" rx="8" fill="#162a1e" stroke="#4caf50" stroke-width="1.5"/>
  <text x="275" y="456" text-anchor="middle" fill="#4caf50" font-size="11" font-weight="bold">Extend subarray</text>
  <text x="275" y="474" text-anchor="middle" fill="#a8d5b5" font-size="11">current += arr[i]</text>

  <!-- ── NODE 5b: Restart (right box) ── -->
  <rect x="345" y="436" width="160" height="48" rx="8" fill="#2a1616" stroke="#e05555" stroke-width="1.5"/>
  <text x="425" y="456" text-anchor="middle" fill="#e05555" font-size="11" font-weight="bold">Start fresh</text>
  <text x="425" y="474" text-anchor="middle" fill="#d5a8a8" font-size="11">current = arr[i]</text>

  <!-- Both merge down -->
  <line x1="275" y1="484" x2="275" y2="530" stroke="#555" stroke-width="1.5"/>
  <line x1="425" y1="484" x2="425" y2="530" stroke="#555" stroke-width="1.5"/>
  <line x1="275" y1="530" x2="425" y2="530" stroke="#555" stroke-width="1.5"/>
  <line x1="350" y1="530" x2="350" y2="554" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── NODE 6: Update best ── -->
  <rect x="210" y="554" width="280" height="44" rx="8" fill="#1a2540" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="350" y="572" text-anchor="middle" fill="#4a90d9" font-size="11" font-weight="bold">Update global best</text>
  <text x="350" y="589" text-anchor="middle" fill="#c0cfe8" font-size="11">best = max(best, current)</text>

  <!-- Arrow -->
  <line x1="350" y1="598" x2="350" y2="626" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── NODE 7: More elements? ── -->
  <polygon points="350,626 490,672 350,718 210,672" fill="#1e1a30" stroke="#f0a500" stroke-width="2"/>
  <text x="350" y="668" text-anchor="middle" fill="#f0a500" font-size="11" font-weight="bold">More elements?</text>
  <text x="350" y="684" text-anchor="middle" fill="#f0a500" font-size="11">(i &lt; n-1)</text>

  <!-- YES → loop back -->
  <text x="192" y="668" text-anchor="middle" fill="#4caf50" font-size="11">YES</text>
  <line x1="210" y1="672" x2="80" y2="672" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="80" y1="672" x2="80" y2="268" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="80" y1="268" x2="210" y2="268" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="52" y="475" text-anchor="middle" fill="#4caf50" font-size="10">next i</text>

  <!-- NO → return -->
  <text x="508" y="668" text-anchor="middle" fill="#e05555" font-size="11">NO</text>
  <line x1="490" y1="672" x2="350" y2="672" stroke="none"/>
  <line x1="350" y1="718" x2="350" y2="746" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── NODE 8: Return best ── -->
  <rect x="220" y="746" width="260" height="44" rx="8" fill="#1a2540" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="350" y="764" text-anchor="middle" fill="#4a90d9" font-size="11" font-weight="bold">return best</text>
  <text x="350" y="781" text-anchor="middle" fill="#c0cfe8" font-size="11">maximum subarray sum</text>

  <!-- Arrow -->
  <line x1="350" y1="790" x2="350" y2="818" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── NODE 9: END ── -->
  <ellipse cx="350" cy="840" rx="70" ry="24" fill="#1e2130" stroke="#7c6af7" stroke-width="2"/>
  <text x="350" y="845" text-anchor="middle" fill="#e0e0e0" font-size="13">END</text>

  <!-- ── LEGEND ── -->
  <rect x="40" y="890" width="620" height="180" rx="10" fill="#13161f" stroke="#333" stroke-width="1"/>
  <text x="350" y="912" text-anchor="middle" fill="#7c6af7" font-size="13" font-weight="bold">Key Insight</text>

  <text x="60" y="936" fill="#f0a500" font-size="12" font-weight="bold">The ONE decision at every step:</text>
  <text x="60" y="956" fill="#c0cfe8" font-size="11">  current + arr[i]  →  extend  (past is a benefit)</text>
  <text x="60" y="974" fill="#c0cfe8" font-size="11">  arr[i] alone      →  restart (past is a burden)</text>

  <text x="60" y="1000" fill="#f0a500" font-size="12" font-weight="bold">Why initialize with arr[0] not 0?</text>
  <text x="60" y="1020" fill="#c0cfe8" font-size="11">  All-negative arrays: [-3, -1, -5] → answer is -1, not 0</text>

  <text x="60" y="1046" fill="#f0a500" font-size="12" font-weight="bold">Mental model:</text>
  <text x="60" y="1066" fill="#c0cfe8" font-size="11">  "Greedy local optimism with a global memory"</text>

  <!-- ── ARROW MARKERS ── -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05555"/>
    </marker>
  </defs>

</svg>
